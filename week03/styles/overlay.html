<!DOCTYPE html>
<html lang="en-US">
<head>
    <link rel="overlaysheet" href="styles/overlay.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Okpewo Damilola James | Overlay Layout Example</title>
    <meta name="description" content="A common layout on the web called the 'overlay'">
    <meta name="author" content="Okpewo Damilola James">
</head>
<body>
    <header>
        <h1>An Overlay Layout Example</h1>
    </header>
    <main>
        <h2>CSS Layout: Position Absolute</h2>
        <div class="herodiv">
                <img src="http://loremflickr.com/700/300/brazil" alt="Kitten placeholder image" width="850" height="300">
                <section class="stats">
                    <h3>Brazil</h3>
                    <p>Language: <span id="lan">Portuguese</span></p>
                    <p>Size: <span id="size">8.5m km<sup>2</up></span></p>
                    <p>Visted?: <span id="visit">No</span></p>
                </section>
        </div>
    </main>
        <footer>Footer Content in Fixed Position with bottom set at 0 pixels.</footer>
</body>
